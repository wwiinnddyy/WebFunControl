name: Build & Release

on:
  push:
    tags: ['v*']
  workflow_dispatch:
    inputs:
      version:
        description: '版本号（如 1.2.0，不含 v 前缀）'
        required: false
        default: ''

jobs:
  # ==================== Windows Native AOT ====================
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'
          dotnet-quality: 'preview'

      - name: Publish Windows Native AOT
        run: |
          $ver = "${{ github.event.inputs.version }}"
          if (-not $ver) { $ver = "${{ github.ref_name }}" -replace '^v','' }
          dotnet publish WebFunControl.Desktop/WebFunControl.Desktop.csproj `
            -c Release `
            -r win-x64 `
            --self-contained true `
            -p:PublishAot=true `
            -p:TrimMode=partial `
            -p:Version=$ver `
            -o ./publish/win-x64

      - name: Package Windows
        run: |
          $files = Get-ChildItem -Path ./publish/win-x64 -Exclude *.pdb
          Compress-Archive -Path $files -DestinationPath ./WebFunControl-win-x64.zip

      - name: Upload Windows artifact
        uses: actions/upload-artifact@v4
        with:
          name: WebFunControl-win-x64
          path: ./WebFunControl-win-x64.zip
          if-no-files-found: error

  # ==================== Android APK ====================
  build-android:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'
          dotnet-quality: 'preview'

      - name: Install Android workload
        run: dotnet workload install android

      - name: Publish Android APK
        run: |
          $ver = "${{ github.event.inputs.version }}"
          if (-not $ver) { $ver = "${{ github.ref_name }}" -replace '^v','' }
          dotnet publish WebFunControl.Android/WebFunControl.Android.csproj `
            -c Release `
            -f net10.0-android `
            -r android-arm64 `
            --self-contained true `
            -p:AndroidPackageFormat=apk `
            -p:Version=$ver `
            -p:ApplicationDisplayVersion=$ver `
            -p:AndroidKeyStore=false `
            -o ./publish/android

      - name: Locate and rename APK
        id: apk
        shell: pwsh
        run: |
          $apk = Get-ChildItem -Path ./publish/android -Filter "*-Signed.apk" -Recurse | Select-Object -First 1
          if (-not $apk) {
            $apk = Get-ChildItem -Path ./publish/android -Filter "*.apk" -Recurse | Select-Object -First 1
          }
          if (-not $apk) { Write-Error "APK not found!"; exit 1 }
          Write-Host "Found APK: $($apk.FullName) ($([math]::Round($apk.Length/1MB,1)) MB)"
          Copy-Item $apk.FullName ./WebFunControl-android.apk

      - name: Upload Android artifact
        uses: actions/upload-artifact@v4
        with:
          name: WebFunControl-android
          path: ./WebFunControl-android.apk
          if-no-files-found: error

  # ==================== GitHub Release ====================
  release:
    needs: [build-windows, build-android]
    runs-on: ubuntu-latest
    # 仅在推送 tag 或手动触发时创建 Release
    if: startsWith(github.ref, 'refs/tags/v') || github.event_name == 'workflow_dispatch'
    permissions:
      contents: write
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: ./artifacts

      - name: Determine version
        id: version
        run: |
          VER="${{ github.event.inputs.version }}"
          if [ -z "$VER" ]; then
            VER="${{ github.ref_name }}"
            VER="${VER#v}"
          fi
          echo "version=$VER" >> $GITHUB_OUTPUT
          echo "tag=${{ github.ref_name }}" >> $GITHUB_OUTPUT

      - name: List artifacts
        run: find ./artifacts -type f -name "*.zip" -o -name "*.apk" | head -20

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag || format('v{0}', steps.version.outputs.version) }}
          name: WebFunControl v${{ steps.version.outputs.version }}
          generate_release_notes: true
          body: |
            ## 下载

            | 平台 | 文件 | 说明 |
            |------|------|------|
            | Windows x64 | `WebFunControl-win-x64.zip` | Native AOT，无需安装 .NET |
            | Android arm64 | `WebFunControl-android.apk` | APK 安装包 |

            ## 系统要求
            - **Windows**: Windows 10 19041 (20H1) 及以上，无需安装 .NET 运行时
            - **Android**: Android 6.0 (API 23) 及以上

            ## 更新说明
            请查看下方自动生成的变更记录。
          files: |
            ./artifacts/WebFunControl-win-x64/*
            ./artifacts/WebFunControl-android/*
          draft: false
          prerelease: false
